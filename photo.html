<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Memory ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #8e2de2, #4a00e0);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .box {
      width: 90%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.15);
      padding: 25px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0px 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 30px;
    }

    img {
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      margin-top: 15px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: gold;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: orange;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>💛 Forever Beautiful Couple 💍❤️</h1>

    <p>May your life be filled with love and happiness forever 🌸✨</p>

    <!-- Your Photo -->
    <img src="InShot_20260507_174353857.jpg" alt="Special Photo">

    <button onclick="goBack()">⬅️ Back to Start</button>
  </div>

  <script>
    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
